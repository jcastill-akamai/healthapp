apiVersion: apps/v1
kind: Deployment
metadata:
  name: statusboard
  namespace: production
  labels:
    app: statusboard
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: statusboard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: statusboard
    spec:
      containers:
      - name: statusboard
        image: ghcr.io/your-org/statusboard:1.0.0
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: statusboard-config
        - secretRef:
            name: statusboard-secrets
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: statusboard-svc
  namespace: production
spec:
  selector:
    app: statusboard
  ports:
  - name: http
    port: 80
    targetPort: 3000
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: statusboard-config
  namespace: production
data:
  APP_ENV: "production"
  LOG_LEVEL: "info"
  DB_HOST: "postgres.svc.cluster.local"
  DB_PORT: "5432"
  VERSION: "1.0.0"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: statusboard-ingress
  namespace: production
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - statusboard.example.com
    secretName: statusboard-tls
  rules:
  - host: statusboard.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: statusboard-svc
            port:
              number: 80
