name: StatusBoard — Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
    - run: npm ci
    - run: npm test

  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
    steps:
    - uses: actions/checkout@v4

    - uses: docker/setup-buildx-action@v3

    - uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - uses: docker/metadata-action@v5
      id: meta
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=sha,format=long,prefix=
          type=semver,pattern={{version}}
          type=raw,value=latest,enable={{is_default_branch}}

    - uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max


  deploy:
    name: Deploy to Dev with helm
    runs-on: ubuntu-latest
    needs: [build-push]
    if: github.event_name == 'workflow_dispatch'
    environment: development
    steps:
    - uses: actions/checkout@v4

    - uses: azure/setup-helm@v3

    - name: Configure kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

    - name: Deploy via Helm
      run: |
        helm upgrade --install statusboard ./helm/statusboard \
          --namespace development \
          --create-namespace \
          --set image.tag=${{ github.sha }} \
          --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
          --atomic \
          --wait \
          --timeout 5m

    - name: Verify rollout
      run: kubectl rollout status deployment/statusboard -n development

  deploy-manual:
    name: Deploy Manual
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: development
    steps:
    - uses: actions/checkout@v4

    - name: Configure kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config

    - name: Deploy via kubectl
      run: |
        sed "s#image: .*#image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}#" deployment.yaml | kubectl apply -f -

    - name: Verify rollout
      run: kubectl rollout status deployment/statusboard -n development
